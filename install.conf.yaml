- defaults:
    link:
      relink: true

- clean: ['~']

- create:
    - ~/Work

- shell:
#  - [git submodule update --init --recursive, Installing submodules]
    - command: ./setup_homebrew.zsh
      stdout: true
      stderr: true

- link:
    ~/.zshrc:
      path: zsh/zshrc

    ~/.zshenv:
      path: zsh/zshenv

    ~/.config/bat:
      create: true
      path: bat

    ~/.config/tmux:
      create: true
      path: tmux

- shell:
  - command: ./setup_tpm.zsh
    stdout: true
    stderr: true